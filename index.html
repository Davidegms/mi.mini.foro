<!DOCTYPE html>
<html>
<head>
  <title>Chat estilo WhatsApp 😎</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 500px;
      margin: auto;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 5px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #25D366;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      text-align: left;
    }

    .msg {
      background: #333;
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
    }

    .me {
      background: #075E54;
      text-align: right;
    }
  </style>
</head>

<body>

<div class="box">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Login 🔐</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <br>
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>

  <!-- CHAT -->
  <div id="chatBox" style="display:none;">
    <h2>Chat 💬</h2>

    <div id="chat"></div>

    <input id="text" placeholder="Escribe mensaje...">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhw9i6jq4bA769gkP__hLxGT9nJ0OFs-k",
  authDomain: "olax-50672.firebaseapp.com",
  projectId: "olax-50672",
  storageBucket: "olax-50672.firebasestorage.app",
  messagingSenderId: "507709298695",
  appId: "1:507709298695:web:baebb3be48d18786cd72a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userActual = "";

/* LOGIN SIMPLE */
window.login = function () {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (!u || !p) {
    document.getElementById("msg").innerText = "Llena todo 💀";
    return;
  }

  let savedU = localStorage.getItem("user");
  let savedP = localStorage.getItem("pass");

  if (!savedU) {
    localStorage.setItem("user", u);
    localStorage.setItem("pass", p);
  }

  if (u === localStorage.getItem("user") && p === localStorage.getItem("pass")) {
    userActual = u;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatBox").style.display = "block";

    startChat();
  } else {
    document.getElementById("msg").innerText = "Incorrecto 💀";
  }
};

/* ENVIAR MENSAJE */
window.send = async function () {
  let text = document.getElementById("text").value.trim();
  if (!text) return;

  await addDoc(collection(db, "mensajes"), {
    user: userActual,
    text: text,
    time: Date.now()
  });

  document.getElementById("text").value = "";
};

/* CHAT EN TIEMPO REAL */
function startChat() {
  const chat = document.getElementById("chat");

  const q = query(collection(db, "mensajes"), orderBy("time"));

  onSnapshot(q, (snapshot) => {
    chat.innerHTML = "";

    snapshot.forEach((doc) => {
      let d = doc.data();

      let div = document.createElement("div");
      div.classList.add("msg");

      if (d.user === userActual) {
        div.classList.add("me");
      }

      div.innerText = d.user + ": " + d.text;
      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  });
}
</script>

</body>
</html>
