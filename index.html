<!DOCTYPE html>
<html>
<head>
  <title>Mini.foro.es</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    #container{
      display:flex;
      height:100vh;
    }

    #users{
      width:220px;
      background:#141414;
      padding:10px;
      overflow-y:auto;
    }

    .user{
      padding:8px;
      margin:5px 0;
      background:#222;
      border-radius:6px;
      cursor:pointer;
    }

    #chat{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    #msgs{
      flex:1;
      overflow-y:auto;
      padding:10px;
    }

    .msg{
      background:#222;
      margin:5px;
      padding:8px;
      border-radius:6px;
    }

    .me{
      background:#075E54;
    }

    #input{
      display:flex;
      background:#151515;
      padding:10px;
    }

    input{
      flex:1;
      padding:10px;
      border:none;
      outline:none;
      background:#222;
      color:white;
    }

    button{
      padding:10px;
      border:none;
      background:#333;
      color:white;
      cursor:pointer;
    }

    img{
      max-width:180px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div id="login">
  <button onclick="loginGoogle()">Entrar con Google</button>
  <h2>Entrar con google</h2>
</div>

<div id="app" style="display:none;">

  <div id="container">

    <!-- USUARIOS -->
    <div id="users"></div>

    <!-- CHAT -->
    <div id="chat">

      <div id="msgs"></div>

      <div id="input">
        <input id="text" placeholder="mensaje...">
        <button onclick="send()">→</button>
      </div>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  onSnapshot,
  where,
  orderBy,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhw9i6jq4bA769gkP__hLxGT9nJ0OFs-k",
  authDomain: "olax-50672.firebaseapp.com",
  projectId: "olax-50672",
  storageBucket: "olax-50672.firebasestorage.app",
  gSenderId: "507709298695",
  appId: "1:507709298695:web:baebb3be48d18786cd72a2"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let mode="public";
let chatId=null;

/* LOGIN */
window.loginGoogle = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
};

/* LOGIN OK */
onAuthStateChanged(auth, async (u)=>{
  if(u){
    user=u;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    // guardar usuario en lista
    await setDoc(doc(db,"users",u.uid),{
      name:u.displayName,
      uid:u.uid
    });

    loadUsers();
    loadChat();
  }
});

/* LISTA DE USUARIOS */
function loadUsers(){

  const q=query(collection(db,"users"));

  onSnapshot(q,(snap)=>{

    const box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(d=>{

      let u=d.data();

      if(u.uid===user.uid) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;

      div.onclick=()=>{
        mode="private";
        chatId=[user.uid,u.uid].sort().join("_");
        loadChat();
      };

      box.appendChild(div);
    });
  });
}

/* ENVIAR MENSAJE */
window.send = async function(){

  let text=document.getElementById("text").value.trim();
  if(!text) return;

  await addDoc(collection(db,"messages"),{
    text,
    user:user.displayName,
    uid:user.uid,
    mode:mode,
    chatId:chatId || "public",
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* CHAT */
function loadChat(){

  let q;

  if(mode==="public"){
    q=query(
      collection(db,"messages"),
      where("mode","==","public"),
      orderBy("time")
    );
  }else{
    q=query(
      collection(db,"messages"),
      where("chatId","==",chatId),
      orderBy("time")
    );
  }

  onSnapshot(q,(snap)=>{

    const box=document.getElementById("msgs");
    box.innerHTML="";

    snap.forEach(doc=>{

      let d=doc.data();

      let div=document.createElement("div");
      div.classList.add("msg");

      if(d.uid===user.uid){
        div.classList.add("me");
      }

      div.innerHTML=`
        <b>${d.user}</b><br>
        ${d.text}
      `;

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

</script>

</body>
</html>
