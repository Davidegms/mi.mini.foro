<!DOCTYPE html>
<html>
<head>
  <title>Chat limpio 😎</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    #login{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    #app{
      display:none;
      height:100vh;
      flex-direction:column;
    }

    #top{
      padding:10px;
      background:#151515;
    }

    #msgs{
      flex:1;
      overflow-y:auto;
      padding:10px;
    }

    .msg{
      background:#222;
      margin:5px;
      padding:8px;
      border-radius:6px;
    }

    .me{
      background:#075E54;
    }

    #input{
      display:flex;
      padding:10px;
      background:#151515;
    }

    input{
      flex:1;
      padding:10px;
      border:none;
      outline:none;
      background:#222;
      color:white;
    }

    button{
      padding:10px;
      border:none;
      background:#333;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Entrar</h2>
  <button onclick="loginGoogle()">Entrar con Google</button>
</div>

<!-- APP -->
<div id="app">

  <div id="top">Chat público 😎</div>

  <div id="msgs"></div>

  <div id="input">
    <input id="text" placeholder="Escribe mensaje...">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  onSnapshot,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhw9i6jq4bA769gkP__hLxGT9nJ0OFs-k",
  authDomain: "olax-50672.firebaseapp.com",
  projectId: "olax-50672"
  orageBucket: "olax-50672.firebasestorage.app",
  gSenderId: "507709298695",
  appId: "1:507709298695:web:baebb3be48d18786cd72a2"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* LOGIN */
window.loginGoogle = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
};

/* CUANDO YA ENTRA */
onAuthStateChanged(auth,(u)=>{
  if(u){
    user=u;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";

    loadMessages();
  }
});

/* ENVIAR MENSAJE */
window.send = async function(){

  let text=document.getElementById("text").value.trim();
  if(!text) return;

  await addDoc(collection(db,"messages"),{
    text:text,
    user:user.displayName,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* CARGAR MENSAJES ORDENADOS */
function loadMessages(){

  const q = query(
    collection(db,"messages"),
    orderBy("time","asc")
  );

  onSnapshot(q,(snap)=>{

    const box=document.getElementById("msgs");
    box.innerHTML="";

    snap.forEach(doc=>{

      const d = doc.data();

      const div=document.createElement("div");
      div.classList.add("msg");

      if(d.user===user.displayName){
        div.classList.add("me");
      }

      div.innerHTML = `<b>${d.user}</b><br>${d.text}`;

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

</script>

</body>
</html>
