<!DOCTYPE html>
<html>
<head>
  <title>Chat Pro 😎</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      margin: auto;
      text-align: left;
    }

    .msg {
      background: #333;
      margin: 5px;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .me {
      background: #075E54;
    }

    img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 10px;
      background: #25D366;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Chat Firebase 😎</h2>

<div id="loginBox">
  <button onclick="loginGoogle()">Entrar con Google</button>
</div>

<div id="chatBox" style="display:none;">
  <div id="chat"></div>

  <input id="text" placeholder="Escribe mensaje...">
  <button onclick="send()">Enviar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  orderBy,
  query,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "olax-50672.firebaseapp.com",
  projectId: "olax-50672",
  storageBucket: "olax-50672.firebasestorage.app",
  messagingSenderId: "507709298695",
  appId: "1:507709298695:web:baebb3be48d18786cd72a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user = null;

/* LOGIN GOOGLE */
window.loginGoogle = async function () {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

/* DETECTA USUARIO */
onAuthStateChanged(auth, (u) => {
  if (u) {
    user = u;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatBox").style.display = "block";

    loadChat();
  }
});

/* ENVIAR MENSAJE */
window.send = async function () {
  let text = document.getElementById("text").value.trim();
  if (!text) return;

  await addDoc(collection(db, "mensajes"), {
    text: text,
    name: user.displayName,
    photo: user.photoURL,
    time: Date.now()
  });

  document.getElementById("text").value = "";
};

/* TIEMPO REAL */
function loadChat() {
  const q = query(collection(db, "mensajes"), orderBy("time"));

  onSnapshot(q, (snap) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snap.forEach((doc) => {
      let d = doc.data();

      let div = document.createElement("div");
      div.classList.add("msg");

      div.innerHTML = `
        <img src="${d.photo}">
        <b>${d.name}</b>: ${d.text}
      `;

      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  });
}
</script>

</body>
</html>
