<!DOCTYPE html>
<html>
<head>
  <title>mini.foro.es.v23</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0f0f0f;
      color:#eee;
    }

    #top{
      padding:10px;
      background:#151515;
      display:flex;
      justify-content:space-between;
    }

    #container{
      display:flex;
      height:92vh;
    }

    #side{
      width:220px;
      background:#141414;
      padding:10px;
    }

    #chat{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    #msgs{
      flex:1;
      overflow-y:auto;
      padding:10px;
    }

    .msg{
      margin:5px 0;
      padding:8px;
      background:#222;
      border-radius:6px;
    }

    .me{
      background:#075E54;
    }

    #input{
      display:flex;
      background:#151515;
      padding:10px;
    }

    input{
      flex:1;
      padding:10px;
      border:none;
      outline:none;
      background:#222;
      color:white;
    }

    button{
      padding:10px;
      border:none;
      background:#333;
      color:white;
      cursor:pointer;
    }

    img{
      max-width:180px;
      border-radius:8px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<div id="top">
  <div>Chat</div>
  <div id="user"></div>
</div>

<div id="container">

  <div id="side">
    <div onclick="setMode('public')">Sala pública</div>
    <div onclick="startPrivate()">Privado</div>
  </div>

  <div id="chat">

    <div id="msgs"></div>

    <div id="input">
      <input id="text" placeholder="mensaje...">
      <input type="file" id="img">
      <button onclick="send()">→</button>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  onSnapshot,
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhw9i6jq4bA769gkP__hLxGT9nJ0OFs-k",
  authDomain: "olax-50672.firebaseapp.com",
  projectId: "olax-50672",
  storageBucket: "olax-50672.firebasestorage.app",
  messagingSenderId: "507709298695",
  appId: "1:507709298695:web:baebb3be48d18786cd72a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

let user=null;
let mode="public";
let chatId=null;

/* LOGIN AUTOMATICO */
const provider=new GoogleAuthProvider();
signInWithPopup(auth,provider);

/* USER */
onAuthStateChanged(auth,(u)=>{
  if(u){
    user=u;
    document.getElementById("user").innerText=u.displayName;
    load();
  }
});

/* MODE */
window.setMode=function(m){
  mode=m;
  load();
};

/* PRIVATE SIMPLE */
window.startPrivate=function(){
  let other=prompt("Email del usuario");
  chatId=[user.email,other].sort().join("_");
  mode="private";
  load();
};

/* SEND */
window.send=async function(){

  let text=document.getElementById("text").value.trim();
  let file=document.getElementById("img").files[0];

  let img=null;

  if(file){
    let r=ref(storage,"img/"+Date.now());
    await uploadBytes(r,file);
    img=await getDownloadURL(r);
  }

  if(!text && !img) return;

  let data={
    text,
    user:user.displayName,
    photo:user.photoURL,
    img,
    time:Date.now(),
    mode:mode
  };

  if(mode==="private") data.chatId=chatId;

  await addDoc(collection(db,"messages"),data);

  document.getElementById("text").value="";
  document.getElementById("img").value="";
};

/* LOAD */
function load(){

  let q;

  if(mode==="public"){
    q=query(collection(db,"messages"),
    where("mode","==","public"),
    orderBy("time"));
  }else{
    q=query(collection(db,"messages"),
    where("chatId","==",chatId),
    orderBy("time"));
  }

  onSnapshot(q,(snap)=>{

    let box=document.getElementById("msgs");
    box.innerHTML="";

    snap.forEach(d=>{

      let m=d.data();

      let div=document.createElement("div");
      div.className="msg";

      if(m.user===user.displayName) div.classList.add("me");

      div.innerHTML=`
        <b>${m.user}</b><br>
        ${m.text||""}<br>
        ${m.img?`<img src="${m.img}">`:""}
      `;

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

</script>

</body>
</html>
