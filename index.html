<!DOCTYPE html>
<html>
<head>
  <title>mini.foro.es</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    #container{
      display:flex;
      height:100vh;
    }

    #users{
      width:220px;
      background:#141414;
      padding:10px;
    }

    #chat{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    #msgs{
      flex:1;
      overflow-y:auto;
      padding:10px;
    }

    .msg{
      background:#222;
      margin:5px;
      padding:8px;
      border-radius:6px;
    }

    .me{
      background:#075E54;
    }

    #input{
      display:flex;
      background:#151515;
      padding:10px;
    }

    input{
      flex:1;
      padding:10px;
      border:none;
      outline:none;
      background:#222;
      color:white;
    }

    button{
      padding:10px;
      border:none;
      background:#333;
      color:white;
    }
  </style>
</head>

<body>

<div id="login">
  <h2>Entrar con gogle</h2>
  <button onclick="loginGoogle()">Entrar con Google</button>
</div>

<div id="app" style="display:none;">

  <div id="container">

    <div id="users"></div>

    <div id="chat">

      <div id="msgs"></div>

      <div id="input">
        <input id="text" placeholder="mensaje...">
        <button onclick="send()">→</button>
      </div>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhw9i6jq4bA769gkP__hLxGT9nJ0OFs-k",
  authDomain: "olax-50672.firebaseapp.com",
  projectId: "olax-50672"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;

/* LOGIN */
window.loginGoogle = async function(){
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
};

/* LOGIN OK */
onAuthStateChanged(auth,(u)=>{
  if(u){
    user=u;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    loadMessages();
  }
});

/* ENVIAR MENSAJE */
window.send = async function(){

  let text=document.getElementById("text").value.trim();
  if(!text) return;

  await addDoc(collection(db,"messages"),{
    text:text,
    user:user.displayName,
    uid:user.uid,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* CARGAR MENSAJES (SIN FILTROS QUE ROMPAN) */
function loadMessages(){

  const col = collection(db,"messages");

  onSnapshot(col,(snap)=>{

    const box=document.getElementById("msgs");
    box.innerHTML="";

    snap.forEach(doc=>{

      const d = doc.data();

      let div=document.createElement("div");
      div.classList.add("msg");

      if(d.uid===user.uid){
        div.classList.add("me");
      }

      div.innerHTML = `<b>${d.user}</b><br>${d.text}`;

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
  });
}

</script>

</body>
</html>
